<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c6af7"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="lock" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e0d9ff;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Lock body -->
  <rect x="9" y="15" width="14" height="11" rx="3" fill="url(#lock)"/>
  <!-- Lock shackle -->
  <path d="M11.5 15v-3.5a4.5 4.5 0 0 1 9 0V15" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="16" cy="20.5" r="1.8" fill="#7c6af7"/>
  <rect x="15.2" y="21.5" width="1.6" height="2.5" rx="0.8" fill="#7c6af7"/>
</svg>
