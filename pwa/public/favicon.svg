<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b4fe8"/>
      <stop offset="100%" stop-color="#9d7cf4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="32" height="16" rx="8" fill="url(#shine)"/>
  <!-- Lock body -->
  <rect x="9.5" y="16" width="13" height="10" rx="2.5" fill="white" opacity="0.95"/>
  <!-- Lock shackle -->
  <path d="M12 16v-3a4 4 0 0 1 8 0v3" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  <!-- Keyhole dot -->
  <circle cx="16" cy="20.5" r="1.6" fill="#7c6af7"/>
  <!-- Keyhole stem -->
  <rect x="15.3" y="21.4" width="1.4" height="2.2" rx="0.7" fill="#7c6af7"/>
</svg>
