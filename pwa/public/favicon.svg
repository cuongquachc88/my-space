<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2d2060"/>
    </linearGradient>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="shield-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Shield — golden fill -->
  <path d="M16 4 L26 8 L26 16 C26 21.5 21.5 26.5 16 28.5 C10.5 26.5 6 21.5 6 16 L6 8 Z"
        fill="url(#shield-grad)" filter="url(#glow)"/>
  <!-- Shield shine -->
  <path d="M16 4 L26 8 L26 16 C26 21.5 21.5 26.5 16 28.5 C10.5 26.5 6 21.5 6 16 L6 8 Z"
        fill="url(#shield-shine)"/>

  <!-- Lock body -->
  <rect x="11.5" y="16.5" width="9" height="7" rx="1.8" fill="#1a1a2e" opacity="0.85"/>
  <!-- Lock shackle -->
  <path d="M13.5 16.5v-2.2a2.5 2.5 0 0 1 5 0v2.2"
        fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <!-- Keyhole -->
  <circle cx="16" cy="19.8" r="1.2" fill="#f59e0b"/>
  <rect x="15.45" y="20.8" width="1.1" height="1.6" rx="0.55" fill="#f59e0b"/>
</svg>
