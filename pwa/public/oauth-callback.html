<!doctype html>
<html>
<head><meta charset="UTF-8" /><title>Connecting…</title></head>
<body style="background:#0f0f23;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:Inter,sans-serif;color:#fff">
  <div style="text-align:center">
    <div style="font-size:32px;margin-bottom:12px">🔐</div>
    <div style="font-size:14px;opacity:0.6">Connecting to Google Drive…</div>
  </div>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search)
      const code = params.get('code')
      const state = params.get('state')
      const error = params.get('error')

      if (!window.opener) {
        // Mobile browser redirect flow: store code in sessionStorage, redirect back to app
        if (error) {
          sessionStorage.setItem('oauth_error', error)
        } else if (code && state) {
          sessionStorage.setItem('oauth_code', code)
          sessionStorage.setItem('oauth_state_return', state)
        } else {
          sessionStorage.setItem('oauth_error', 'no_code')
        }
        window.location.replace('/')
        return
      }

      if (error) {
        window.opener.postMessage({ type: 'OAUTH_ERROR', error }, window.location.origin)
        window.close()
        return
      }

      if (code && state) {
        window.opener.postMessage({ type: 'OAUTH_CODE', code, state }, window.location.origin)
        window.close()
        return
      }

      window.opener.postMessage({ type: 'OAUTH_ERROR', error: 'no_code' }, window.location.origin)
      window.close()
    })()
  </script>
</body>
</html>
