<!doctype html>
<html>
<head><meta charset="UTF-8" /><title>Connecting…</title></head>
<body style="background:#0f0f23;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:Inter,sans-serif;color:#fff">
  <div style="text-align:center">
    <div style="font-size:32px;margin-bottom:12px">🔐</div>
    <div style="font-size:14px;opacity:0.6">Connecting to Google Drive…</div>
  </div>
  <script>
    (function () {
      const hash = new URLSearchParams(window.location.hash.slice(1))
      const params = new URLSearchParams(window.location.search)
      const token = hash.get('access_token')
      const state = hash.get('state') || params.get('state')
      const error = hash.get('error') || params.get('error')

      if (error) {
        localStorage.setItem('oauth_error', error)
        window.location.href = '/'
        return
      }

      if (token && state) {
        const storedState = localStorage.getItem('oauth_state')
        if (!storedState || storedState !== state) {
          localStorage.setItem('oauth_error', 'state_mismatch')
          window.location.href = '/'
          return
        }
        localStorage.setItem('drive_token', token)
        localStorage.removeItem('oauth_state')
        window.location.href = '/'
        return
      }

      window.location.href = '/'
    })()
  </script>
</body>
</html>
