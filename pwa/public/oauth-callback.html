<!doctype html>
<html>
<head><meta charset="UTF-8" /><title>Connecting…</title></head>
<body style="background:#0f0f23;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:Inter,sans-serif;color:#fff">
  <div style="text-align:center">
    <div style="font-size:32px;margin-bottom:12px">🔐</div>
    <div style="font-size:14px;opacity:0.6">Connecting to Google Drive…</div>
  </div>
  <script>
    (function () {
      const hash = new URLSearchParams(window.location.hash.slice(1))
      const params = new URLSearchParams(window.location.search)
      const token = hash.get('access_token')
      const state = hash.get('state') || params.get('state')
      const error = hash.get('error') || params.get('error')

      if (error) {
        if (window.opener) {
          window.opener.postMessage({ type: 'OAUTH_ERROR', error }, window.location.origin)
          window.close()
        } else {
          window.location.href = '/?oauth_error=' + encodeURIComponent(error)
        }
        return
      }

      if (token && state) {
        if (window.opener) {
          // Popup flow: send token+state to parent for validation, parent closes us
          window.opener.postMessage({ type: 'OAUTH_TOKEN', token, state }, window.location.origin)
          window.close()
        } else {
          // Redirect flow (no popup): store in localStorage so main app can pick it up
          localStorage.setItem('oauth_pending', JSON.stringify({ token, state, ts: Date.now() }))
          window.location.href = '/'
        }
        return
      }

      // No token and no error — likely landed here directly, go home
      window.location.href = '/'
    })()
  </script>
</body>
</html>
