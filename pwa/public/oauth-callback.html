<!doctype html>
<html>
<head><meta charset="UTF-8" /><title>Connecting…</title></head>
<body style="background:#0f0f23;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:Inter,sans-serif;color:#fff">
  <div style="text-align:center">
    <div style="font-size:32px;margin-bottom:12px">🔐</div>
    <div style="font-size:14px;opacity:0.6">Connecting to Google Drive…</div>
  </div>
  <script>
    (function () {
      const hash = new URLSearchParams(window.location.hash.slice(1))
      const params = new URLSearchParams(window.location.search)
      const token = hash.get('access_token')
      const state = hash.get('state') || params.get('state')
      const error = hash.get('error') || params.get('error')

      if (!window.opener) {
        // Opened directly (not as popup) — just go home
        window.location.href = '/'
        return
      }

      if (error) {
        window.opener.postMessage({ type: 'OAUTH_ERROR', error }, window.location.origin)
        window.close()
        return
      }

      if (token && state) {
        // Send token+state to parent for validation — parent holds oauth_state
        window.opener.postMessage({ type: 'OAUTH_TOKEN', token, state }, window.location.origin)
        window.close()
        return
      }

      window.opener.postMessage({ type: 'OAUTH_ERROR', error: 'no_token' }, window.location.origin)
      window.close()
    })()
  </script>
</body>
</html>
