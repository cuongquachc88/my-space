name: Android Release

on:
  push:
    tags:
      - 'release-android-v*.*.*'
  workflow_dispatch:

jobs:
  build-web:
    name: Build PWA & Sync Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pwa/package-lock.json

      - name: Install PWA dependencies
        working-directory: pwa
        run: npm ci

      - name: Build PWA
        working-directory: pwa
        run: npm run build

      - name: Sync Capacitor Android assets
        working-directory: pwa
        run: npx cap sync android

      - name: Upload android assets
        uses: actions/upload-artifact@v4
        with:
          name: android-web-assets
          path: pwa/android/app/src/main/assets/public
          retention-days: 1

  unit-test:
    name: JVM Unit Tests
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download web assets
        uses: actions/download-artifact@v4
        with:
          name: android-web-assets
          path: pwa/android/app/src/main/assets/public

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run unit tests
        working-directory: pwa/android
        run: ./gradlew test

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: pwa/android/app/build/reports/tests/
          retention-days: 14

  release-build:
    name: Signed Release AAB
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download web assets
        uses: actions/download-artifact@v4
        with:
          name: android-web-assets
          path: pwa/android/app/src/main/assets/public

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > /tmp/myspace-release.jks

      - name: Write keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          install -m 600 /dev/null pwa/android/keystore.properties
          printf 'storeFile=/tmp/myspace-release.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$STORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" \
            > pwa/android/keystore.properties

      - name: Build release AAB
        working-directory: pwa/android
        run: ./gradlew bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: myspace-release-aab
          path: pwa/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      # Uncomment when Play Store service account is configured:
      # - name: Upload to Play Store (internal track)
      #   uses: r0adkll/upload-google-play@v1
      #   with:
      #     serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
