<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My SPACE — Wiki</title>
  <meta name="description" content="My SPACE codebase documentation — architecture, features, systems, and reference." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.14);
      --text: rgba(255,255,255,0.88);
      --muted: rgba(255,255,255,0.45);
      --faint: rgba(255,255,255,0.2);
      --accent: #818cf8;
      --sidebar-w: 280px;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none; z-index: 0;
    }

    /* ── Layout ── */
    .wiki-layout { display: flex; min-height: 100vh; position: relative; z-index: 1; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: rgba(13,17,23,0.92);
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--border);
      position: fixed;
      top: 0; left: 0; bottom: 0;
      overflow-y: auto;
      padding: 0;
      z-index: 10;
    }
    .sidebar-header {
      padding: 20px 22px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: rgba(13,17,23,0.95);
      backdrop-filter: blur(20px);
      z-index: 2;
    }
    .sidebar-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 16px;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
      display: flex; align-items: center; gap: 8px;
    }
    .sidebar-logo svg { flex-shrink: 0; }
    .sidebar-back {
      display: inline-block;
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .sidebar-back:hover { color: var(--accent); }

    .sidebar-nav { padding: 12px 0 40px; }
    .nav-section { margin-bottom: 4px; }
    .nav-section-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--faint);
      padding: 14px 22px 6px;
    }
    .nav-link {
      display: block;
      padding: 5px 22px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      transition: all 0.12s;
      border-left: 2px solid transparent;
    }
    .nav-link:hover {
      color: var(--text);
      background: var(--surface);
    }
    .nav-link.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(129,140,248,0.06);
    }
    .nav-link.indent { padding-left: 34px; font-size: 12px; }

    /* ── Main content ── */
    .main {
      flex: 1;
      margin-left: var(--sidebar-w);
      padding: 0 48px 120px;
      max-width: 920px;
    }

    /* ── Mobile toggle ── */
    .menu-toggle {
      display: none;
      position: fixed;
      top: 14px; left: 14px;
      z-index: 20;
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      align-items: center; justify-content: center;
    }

    /* ── Content styles ── */
    .content { padding-top: 40px; }
    .content h1 {
      font-family: 'Syne', sans-serif;
      font-size: 32px; font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
      color: var(--text);
    }
    .content h2 {
      font-size: 22px; font-weight: 700;
      margin-top: 40px; margin-bottom: 12px;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }
    .content h3 {
      font-size: 17px; font-weight: 600;
      margin-top: 28px; margin-bottom: 10px;
      color: var(--text);
    }
    .content p { margin-bottom: 14px; color: rgba(255,255,255,0.75); }
    .content a { color: var(--accent); text-decoration: none; }
    .content a:hover { text-decoration: underline; }
    .content ul, .content ol { margin: 8px 0 16px 22px; }
    .content li { margin-bottom: 4px; color: rgba(255,255,255,0.7); }
    .content code {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      background: rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 4px;
      color: #c4b5fd;
    }
    .content pre {
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      overflow-x: auto;
      margin: 16px 0;
    }
    .content pre code {
      background: transparent;
      padding: 0;
      color: rgba(255,255,255,0.8);
      font-size: 13px;
    }
    .content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 14px;
    }
    .content th, .content td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }
    .content th {
      background: var(--surface);
      font-weight: 600;
      color: var(--text);
    }
    .content td { color: rgba(255,255,255,0.65); }
    .content blockquote {
      border-left: 3px solid var(--accent);
      margin: 16px 0;
      padding: 8px 16px;
      background: var(--surface);
      border-radius: 0 8px 8px 0;
    }
    .content blockquote p { margin-bottom: 4px; color: var(--muted); }
    .content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }
    .content img { max-width: 100%; border-radius: 10px; }

    /* Mermaid */
    .mermaid {
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      padding: 16px;
      margin: 16px 0;
      text-align: center;
    }

    /* Loading */
    .loading {
      display: flex; align-items: center; justify-content: center;
      min-height: 60vh;
      color: var(--faint);
      font-size: 14px;
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.25s ease;
      }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; padding: 0 20px 80px; }
      .menu-toggle { display: flex; }
      .content h1 { font-size: 24px; }
      .content h2 { font-size: 18px; }
    }
  </style>
</head>
<body>
  <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
  </button>

  <div class="wiki-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a class="sidebar-logo" href="../">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M10 1.5L3 4.5v5c0 4 3.1 7.5 7 8.5 3.9-1 7-4.5 7-8.5v-5L10 1.5z"
              fill="rgba(245,158,11,0.15)" stroke="rgba(251,191,36,0.8)" strokeWidth="1.4" strokeLinejoin="round"/>
            <circle cx="10" cy="8.5" r="2" fill="rgba(245,158,11,0.15)" stroke="rgba(251,191,36,0.8)" strokeWidth="1.3"/>
            <line x1="10" y1="10.5" x2="10" y2="13" stroke="rgba(251,191,36,0.8)" strokeWidth="1.3" strokeLinecap="round"/>
          </svg>
          My SPACE Wiki
        </a>
        <a class="sidebar-back" href="../">← Back to landing page</a>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
    </aside>

    <main class="main">
      <div class="content" id="content">
        <div class="loading">Loading wiki…</div>
      </div>
    </main>
  </div>

  <script>
    // ── Page metadata ──
    const PAGE_ORDER = [
      { path: 'overview/index.md', title: 'Overview', section: 'Overview' },
      { path: 'overview/architecture.md', title: 'Architecture', section: 'Overview' },
      { path: 'overview/getting-started.md', title: 'Getting started', section: 'Overview' },
      { path: 'overview/glossary.md', title: 'Glossary', section: 'Overview' },
      { path: 'by-the-numbers.md', title: 'By the numbers', section: 'Stats' },
      { path: 'lore.md', title: 'Lore', section: 'Stats' },
      { path: 'how-to-contribute/index.md', title: 'Contributing', section: 'Contributing' },
      { path: 'how-to-contribute/development-workflow.md', title: 'Development workflow', section: 'Contributing' },
      { path: 'how-to-contribute/testing.md', title: 'Testing', section: 'Contributing' },
      { path: 'how-to-contribute/debugging.md', title: 'Debugging', section: 'Contributing' },
      { path: 'how-to-contribute/patterns-and-conventions.md', title: 'Patterns and conventions', section: 'Contributing' },
      { path: 'how-to-contribute/tooling.md', title: 'Tooling', section: 'Contributing' },
      { path: 'applications/chrome-extension.md', title: 'Chrome extension', section: 'Applications' },
      { path: 'applications/android-app.md', title: 'Android app', section: 'Applications' },
      { path: 'features/notes.md', title: 'Notes', section: 'Features' },
      { path: 'features/secret-vault.md', title: 'Secret vault', section: 'Features' },
      { path: 'features/password-generator.md', title: 'Password generator', section: 'Features' },
      { path: 'features/subscriptions.md', title: 'Subscriptions', section: 'Features' },
      { path: 'features/reports-and-bills.md', title: 'Reports and bills', section: 'Features' },
      { path: 'features/todo-lists.md', title: 'To-do lists', section: 'Features' },
      { path: 'features/map-pins.md', title: 'Map pins', section: 'Features' },
      { path: 'features/google-drive-sync.md', title: 'Google Drive sync', section: 'Features' },
      { path: 'features/import.md', title: 'Import', section: 'Features' },
      { path: 'systems/message-protocol.md', title: 'Message protocol', section: 'Systems' },
      { path: 'systems/crypto.md', title: 'Cryptography', section: 'Systems' },
      { path: 'systems/database.md', title: 'Database', section: 'Systems' },
      { path: 'security.md', title: 'Security', section: 'Security' },
      { path: 'reference/index.md', title: 'Reference', section: 'Reference' },
      { path: 'reference/data-models.md', title: 'Data models', section: 'Reference' },
      { path: 'reference/dependencies.md', title: 'Dependencies', section: 'Reference' },
      { path: 'reference/configuration.md', title: 'Configuration', section: 'Reference' },
    ];

    // ── Build sidebar ──
    function buildSidebar() {
      const nav = document.getElementById('sidebarNav');
      let currentSection = '';
      for (const page of PAGE_ORDER) {
        if (page.section !== currentSection) {
          currentSection = page.section;
          const st = document.createElement('div');
          st.className = 'nav-section-title';
          st.textContent = page.section;
          nav.appendChild(st);
        }
        const a = document.createElement('a');
        a.className = 'nav-link';
        a.href = '#' + page.path;
        a.textContent = page.title;
        a.dataset.path = page.path;
        a.addEventListener('click', (e) => {
          e.preventDefault();
          loadPage(page.path);
          if (window.innerWidth <= 900) {
            document.getElementById('sidebar').classList.remove('open');
          }
        });
        nav.appendChild(a);
      }
    }

    // ── Load page ──
    async function loadPage(path) {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading">Loading…</div>';

      // Update active nav link
      document.querySelectorAll('.nav-link').forEach(a => {
        a.classList.toggle('active', a.dataset.path === path);
      });

      // Update URL hash
      history.replaceState(null, '', '#' + path);

      try {
        const res = await fetch(path);
        if (!res.ok) throw new Error('Page not found');
        const md = await res.text();

        // Configure marked
        marked.setOptions({
          breaks: false,
          gfm: true,
        });

        // Render markdown
        const html = marked.parse(md);
        content.innerHTML = html;

        // Process mermaid blocks
        content.querySelectorAll('code.language-mermaid').forEach(el => {
          const div = document.createElement('div');
          div.className = 'mermaid';
          div.textContent = el.textContent;
          el.parentElement.replaceWith(div);
        });
        if (window.mermaid) {
          mermaid.run({ querySelector: '.mermaid' });
        }

        // Scroll to top
        window.scrollTo(0, 0);
      } catch (err) {
        content.innerHTML = '<p>Could not load this page. Make sure the wiki files are deployed.</p>';
      }
    }

    // ── Init ──
    buildSidebar();
    mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' });

    // Load initial page from hash or default
    const hash = window.location.hash.slice(1);
    const initialPage = hash || 'overview/index.md';
    loadPage(initialPage);

    // Mobile menu toggle
    document.getElementById('menuToggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
    });
  </script>
</body>
</html>
